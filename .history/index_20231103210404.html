<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Hat</title>
    <link href="main.css" rel="stylesheet">
</head>
<body>
    <!-- Sorting Hat Form -->
    <div class="container">
        <form class="my-form">
            <div class="form-group">
                <label for="exampleInput">Student Name</label>
                <input type="text" class="form-control" id="exampleInput" placeholder="Harry Potter">
            </div>
            <div class="form-group">
                <label for="examplePassword">Image URL</label>
                <input type="text" class="form-control" id="examplePassword" placeholder="https://www.google.com/images">
            </div>
            <div class="d-grid gap-2">
                <button class="btn btn-primary" id="form-submit" type="button">Sort</button>
            </div>
        </form>
    </div>

    <div id="app" class="text-center"></div>

    <script src="main.js"></script>
</body>
</html>
