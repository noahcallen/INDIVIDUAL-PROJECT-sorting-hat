<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorting Hat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <!-- Sorting Hat Form -->
  <div class="mainDiv">
    <div id="addForm">
      <form id="add-pet-form">
        <div class="form-floating mb-3">
          <input type="text" class="form-control col-8" id="petName" placeholder="Buster">
          <label for="petName">Pet's Name</label>
        </div>
        <div class="form-floating mb-3">
          <input type="text" class="form-control col-8" id="imageUrl" placeholder="www.photo.com">
          <label for="imageUrl">Pet Image Link</label>
        </div>
        <div class="d-grid gap-2">
          <button class="btn btn-success" type="submit" id="form-submit">Add Pet</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
