<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Hat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <h1 id="title">Sorting Hat</h1>

    <div id="addForm">
        <form id="add-pet-form">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="exampleInput" placeholder="Harry Potter">
                <label for="exampleInput">Student Name</label>
            </div>
            <div class="form-floating">
                <input type="text" class="form-control" id="examplePassword" placeholder="https://www.google.com/images">
                <label for="examplePassword">Image URL</label>
            </div>
            <div class="d-grid gap-2">
                <button class="btn btn-success" type="button" id="form-submit">Sort</button>
            </div>
        </form>
    </div>
    <div id="button-group" class="text-center">
      <button type="button" id="gryffindor" class="btn btn-primary">Gryffindor</button>
      <button type="button" id="hufflepuff" class="btn btn-warning">Hufflepuff</button>
      <button type="button" id="ravenclaw" class="btn btn-danger">Ravenclaw</button>
      <button type="button" id="slytherin" class="btn btn-info">Slytherin</button>
      <button type="button" id="allWizards" class="btn btn-success">All</button>
  </div>

    <div id="app" class="text-center">
        <div class="row" id="card-row"></div>
    </div>

    <div id="vMansArmy" class="text-center">
      <h2>V Mans Army</h2>
  </div>
  <div id="expelledSection"></div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>
</html>
