<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorting Hat</title>
  <link href="assets/styles/main.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <form class="my-form">
        <div class="form-group">
            <label for="exampleInput">Student Name</label>
            <input type="text" class="form-control" id="exampleInput" placeholder="Harry Potter">
        </div>
        <div class="form-group">
            <label for="examplePassword">Image URL</label>
            <input type="text" class="form-control" id="examplePassword" placeholder="https://www.example.com/image.jpg">
        </div>
        <div class="d-grid gap-2">
          <button id="sortButton" class="btn btn-primary" type="button">Sort</button>
        </div>
    </form>
  </div>

  <div id="cardContainer" class="container mt-4">
    <!-- Cards will be appended here -->
  </div>

  <script type="module" src="scripts/main.js"></script>
</body>
</html>
