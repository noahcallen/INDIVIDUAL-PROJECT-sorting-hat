<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Hat</title>
    <link href="assets/styles/main.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <form id="add-student-form">
            <div class="form-group">
                <label for="exampleInput">Student Name</label>
                <input type="text" class="form-control" id="exampleInput" placeholder="Enter student name">
            </div>
            <div class="form-group">
                <label for="examplePassword">Image URL</label>
                <input type="text" class="form-control" id="examplePassword" placeholder="Enter image URL">
            </div>
            <div class="d-grid gap-2">
                <button class="btn btn-primary" type="button" id="addCardButton">Add Card</button>
            </div>
        </form>
    </div>

    <div id="cardContainer" class="container mt-4">
        <!-- Cards will be appended here -->
    </div>

    <script src="scripts/main.js"></script>
</body>
</html>
